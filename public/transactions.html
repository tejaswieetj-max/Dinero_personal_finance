<!DOCTYPE html>
<html lang="en">
<head>
  <title>Transactions</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/features.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body onload="loadUser()">
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

  <div class="layout">
    <aside class="sidebar">
      <h2>Dinero</h2>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a class="active" href="transactions.html">Transactions</a>
        <a href="bills.html">Bills</a>
        <a class="logout-link" href="#" onclick="logout()">Logout</a>
      </nav>
    </aside>

    <main class="content">
      <div class="page-header">
        <div class="page-title">
          <h1>Transactions</h1>
          <p>Recent activity across your accounts.</p>
        </div>

        <div class="pill">
          <img id="userAvatar" class="header-avatar" alt="User avatar">
          <div>
            <div style="font-weight:700;">Hi, <span id="username"></span></div>
            <div style="color:var(--text-muted); font-size:12px;">Overview</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="row">
          <div>
            <input class="input" type="text" placeholder="Search transactions (demo)">
          </div>
          <div style="display:flex; gap:10px; justify-content:flex-end; align-items:center;">
            <button class="btn secondary" type="button" onclick="exportTransactionsCSV()">Export CSV</button>
            <button class="btn secondary" type="button" onclick="openBudgetModal()">Set Budgets</button>
            <button class="btn" type="button">New Transfer</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <table class="table" aria-label="Transactions table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Description</th>
              <th>Category</th>
              <th style="text-align:right;">Amount</th>
            </tr>
          </thead>
          <tbody id="transactionsBody">
            <!-- Dynamic transactions will be rendered here -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="budgetModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Budget Settings</h2>
        <button class="modal-close" onclick="closeBudgetModal()">&times;</button>
      </div>
      <div id="budgetList">
        <!-- Dynamic budget items will be injected here -->
      </div>
      <div style="margin-top:20px; display:flex; justify-content:flex-end;">
        <button class="btn" onclick="saveBudgetSettings()">Save Budgets</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/features.js"></script>
</body>
</html>
