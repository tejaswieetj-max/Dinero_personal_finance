<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify Identity</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/auth-method.css">
</head>
<body class="auth-bg">
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  <div class="auth-user-pill">
    <img id="userAvatar" class="auth-avatar" alt="User avatar">
    <div class="auth-user-meta">
      <span class="auth-user-name" id="username"></span>
      <span class="auth-user-label">Account</span>
    </div>
  </div>
  <div class="auth-card auth-method-card">
    <h1>Verify Identity</h1>
    <p class="sub">Choose your authentication method</p>
<a href="security.html" class="method-card">
  <div class="icon pin">🔑</div>
  <div>
    <h3>Enter PIN</h3>
    <p>Use your 4-digit code</p>
  </div>
</a>
<a href="face-id.html" class="method-card">
  <div class="icon face">👤</div>
  <div>
    <h3>Face ID</h3>
    <p>Biometric authentication</p>
  </div>
</a>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
