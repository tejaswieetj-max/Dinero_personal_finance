<!DOCTYPE html>
<html lang="en">
<head>
  <title>Monthly Report Card</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/features.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .report-card {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      border-radius: 30px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }
    .report-card::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(45, 183, 132, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .grade-circle {
      width: 120px;
      height: 120px;
      border-radius: 60px;
      background: var(--primary);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 4rem;
      font-weight: 900;
      margin: 0 auto 24px;
      box-shadow: 0 0 30px var(--primary);
    }
    .report-stat {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    .report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }
  </style>
</head>
<body onload="loadUser()">
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

  <div class="layout">
    <aside class="sidebar">
      <h2>Dinero</h2>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="transactions.html">Transactions</a>
        <a href="bills.html">Bills</a>
        <a class="logout-link" href="#" onclick="logout()">Logout</a>
      </nav>
    </aside>

    <main class="content">
      <div class="page-header">
        <div class="page-title">
          <h1>Report Card</h1>
          <p>Your financial performance this month.</p>
        </div>
      </div>

      <div class="report-card" id="reportCard">
        <div class="grade-circle" id="reportGrade">?</div>
        <h2 style="font-size: 2rem; margin-bottom: 8px;" id="reportMonth">Month</h2>
        <p style="opacity: 0.7; margin-bottom: 32px;">Financial Performance Summary</p>

        <div class="report-stat">
          <small style="opacity: 0.7; text-transform: uppercase; letter-spacing: 1px;">Savings Rate</small>
          <h1 style="font-size: 3rem; margin: 8px 0;" id="reportSavingsRate">0%</h1>
          <div class="progress-container" style="max-width: 200px; margin: 0 auto; background: rgba(255,255,255,0.1);">
            <div id="reportSavingsProgress" class="progress-bar" style="width: 0%;"></div>
          </div>
        </div>

        <div class="report-grid">
          <div class="report-stat">
            <small style="opacity: 0.7;">Top Spending</small>
            <h3 id="reportTopCategory" style="margin-top: 8px;">None</h3>
          </div>
          <div class="report-stat">
            <small style="opacity: 0.7;">Biggest Single Expense</small>
            <p id="reportBiggestExpense" style="margin-top: 8px; font-weight: 700;">None</p>
          </div>
          <div class="report-stat">
            <small style="opacity: 0.7;">Budget Breaches</small>
            <h3 id="reportBudgetBreaches" style="margin-top: 8px;">0</h3>
          </div>
          <div class="report-stat">
            <small style="opacity: 0.7;">Spending Anomalies</small>
            <h3 id="reportAnomalies" style="margin-top: 8px;">0</h3>
          </div>
        </div>

        <button class="btn" style="margin-top: 32px; background: white; color: #0f172a; width: 100%; font-weight: 700; height: 50px;" onclick="window.print()">Export as PDF</button>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/features.js"></script>
</body>
</html>
