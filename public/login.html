<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login | Dinero</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
  </head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>
<div class="welcome-wrapper">
  <div class="welcome-left">
    <h1>Welcome to <span>Dinero</span></h1>
    <p>
      Your personal banking assistant that helps you keep track of
      your financial responsibilities.
    </p>
    <p style="margin-top: 8px; font-size: 13px; color: var(--text-muted);">
      <h4>Done by - <strong>Tejas</strong></h4>
      <h4><b>24BE5518</b></h4>
    </p>
    <ul class="features">
      <li>✔ Bank card integration</li>
      <li>✔ UPI integration</li>
      <li>✔ Monthly insights</li>
    </ul>
  </div>
  <div class="welcome-card">
    <img src="assets/logo.png" class="bank-logo" alt="Dinero logo">
    <h2>Welcome back</h2>
    <div class="form-area">
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
    </div>
    <button type="button" class="primary-btn" onclick="login()">Sign In</button>
    <p id="error" class="error"></p>
  </div>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
