<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bill Calendar</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/features.css">
</head>
<body onload="loadUser()">
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

  <div class="layout">
    <aside class="sidebar">
      <h2>Dinero</h2>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="transactions.html">Transactions</a>
        <a href="bills.html">Bills</a>
        <a class="logout-link" href="login.html">Logout</a>
      </nav>
    </aside>

    <main class="content">
      <div class="page-header">
        <div class="page-title">
          <h1>Bill Calendar</h1>
          <p>Visualize your upcoming financial commitments.</p>
        </div>

        <div class="pill">
          <img id="userAvatar" class="header-avatar" alt="User avatar">
          <div>
            <div style="font-weight:700;">Hi, <span id="username"></span></div>
            <div style="color:var(--text-muted); font-size:12px;">Monthly View</div>
          </div>
        </div>
      </div>

      <div class="calendar-container">
        <div class="calendar-header">
          <h2 id="calendarMonthLabel">February 2026</h2>
          <div style="display:flex; gap:10px;">
            <button class="btn secondary" onclick="changeMonth(-1)">←</button>
            <button class="btn secondary" onclick="changeMonth(1)">→</button>
          </div>
        </div>

        <div class="calendar-grid" id="calendarGrid">
          <!-- Calendar will be rendered here -->
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/features.js"></script>
</body>
</html>
