<!DOCTYPE html>
<html lang="en">
<head>
  <title>Savings Goals</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/features.css">
</head>
<body onload="loadUser()">
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

  <div class="layout">
    <aside class="sidebar">
      <h2>Dinero</h2>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="transactions.html">Transactions</a>
        <a href="bills.html">Bills</a>
        <a class="logout-link" href="login.html">Logout</a>
      </nav>
    </aside>

    <main class="content">
      <div class="page-header">
        <div class="page-title">
          <h1>Savings Goals</h1>
          <p>Track your dreams and plan your future.</p>
        </div>

        <div class="pill">
          <img id="userAvatar" class="header-avatar" alt="User avatar">
          <div>
            <div style="font-weight:700;">Hi, <span id="username"></span></div>
            <div style="color:var(--text-muted); font-size:12px;">Financial Goals</div>
          </div>
        </div>
      </div>

      <div class="row">
        <div style="flex: 2;">
          <div id="goalsContainer">
            <!-- Dynamic goals will be rendered here -->
          </div>
        </div>
        
        <div style="flex: 1; min-width: 300px;">
          <div class="panel">
            <h3>Create a New Goal</h3>
            <p style="color:var(--text-muted); font-size:13px; margin: 8px 0 20px;">Setting a goal is the first step in turning the invisible into the visible.</p>
            
            <div class="budget-item" style="flex-direction: column; align-items: flex-start;">
              <small>Goal Name</small>
              <input type="text" id="goalName" class="budget-input" style="width: 100%; text-align: left;" placeholder="e.g. New Laptop">
            </div>
            
            <div class="budget-item" style="flex-direction: column; align-items: flex-start;">
              <small>Target Amount (₹)</small>
              <input type="number" id="goalTarget" class="budget-input" style="width: 100%;" placeholder="50000">
            </div>

            <div class="budget-item" style="flex-direction: column; align-items: flex-start;">
              <small>Current Savings (₹)</small>
              <input type="number" id="goalCurrent" class="budget-input" style="width: 100%;" placeholder="0">
            </div>
            
            <div class="budget-item" style="flex-direction: column; align-items: flex-start;">
              <small>Target Date</small>
              <input type="date" id="goalDeadline" class="budget-input" style="width: 100%;">
            </div>

            <button class="btn" style="width: 100%; margin-top: 10px;" onclick="createNewGoal()">Create Goal</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/features.js"></script>
  <script>
    function createNewGoal() {
      const name = document.getElementById("goalName").value;
      const target = parseFloat(document.getElementById("goalTarget").value);
      const current = parseFloat(document.getElementById("goalCurrent").value || 0);
      const deadline = document.getElementById("goalDeadline").value;

      if (!name || isNaN(target) || !deadline) {
        alert("Please fill all required fields");
        return;
      }

      const goals = getGoals();
      goals.push({
        name,
        target: Math.round(target * 100),
        current: Math.round(current * 100),
        deadline,
        createdAt: new Date().toISOString()
      });
      saveGoals(goals);
      
      // Clear inputs
      document.getElementById("goalName").value = "";
      document.getElementById("goalTarget").value = "";
      document.getElementById("goalCurrent").value = "";
      document.getElementById("goalDeadline").value = "";
      
      renderGoals();
    }
  </script>
</body>
</html>
